name: 每日生成个贷HOT日报

on:
  schedule:
    # UTC 21:12 = 北京时间凌晨 05:12（避开整点高峰，减少排队延迟）
    - cron: "12 21 * * *"
  workflow_dispatch:
    inputs:
      dryrun:
        description: "试运行（1=只测试不写入）"
        required: false
        default: ""

permissions:
  contents: write
  models: read

concurrency:
  group: daily-report
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 采集近48小时资讯
        run: node scripts/collect.js

      - name: AI 编辑生成今日日报
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DRY_RUN: ${{ inputs.dryrun }}
        run: node scripts/editorial.js

      - name: 生成 AI 播客
        if: ${{ inputs.dryrun != '1' }}
        continue-on-error: true
        run: |
          pip install --quiet edge-tts
          node scripts/podcast.js

      - name: 重建站点页面
        run: node build.js

      - name: 清理90天前的播客音频（文字数据永久保留）
        run: |
          find audio -name "*.mp3" -mtime +90 -delete 2>/dev/null || true
          cutoff=$(TZ=Asia/Shanghai date -d "90 days ago" +%F)
          for f in audio/*.mp3; do
            [ -e "$f" ] || continue
            d=$(basename "$f" .mp3)
            [[ "$d" < "$cutoff" ]] && rm -f "$f" && echo "清理 $f"
          done
          true

      - name: 提交并推送
        run: |
          git config user.name "gedai-hot-bot"
          git config user.email "actions@github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "无变化，跳过提交"
          else
            git commit -m "日报 $(TZ=Asia/Shanghai date +%F)（云端自动生成）"
            git push
          fi
